<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moly Editor - AI 电商编辑器 (V1.1 Interactive)</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: {
                            main: '#0a0a0a',     // 整体深黑背景
                            panel: '#121212',    // 两侧面板背景
                            card: '#1C1C1E',     // 卡片/输入框背景
                            hover: '#262626',
                            border: '#ffffff1a'  // 10% 透明度白边框
                        },
                        brand: {
                            blue: '#0066FF',
                            hover: '#0052cc'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'PingFang SC', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #0a0a0a;
            color: #e5e5e5;
            overflow: hidden;
            user-select: none;
            /* 防止拖拽时选中文本 */
        }

        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }

        /* Toggle 开关样式 */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #0066FF;
        }

        .toggle-checkbox:checked+.toggle-label {
            background-color: #0066FF;
        }

        /* 画布区域网格背景 (模拟 PS 透明背景) */
        .canvas-grid {
            background-image:
                linear-gradient(45deg, #1a1a1a 25%, transparent 25%),
                linear-gradient(-45deg, #1a1a1a 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #1a1a1a 75%),
                linear-gradient(-45deg, transparent 75%, #1a1a1a 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }

        /* 鼠标手势 */
        .cursor-grab {
            cursor: grab;
        }

        .cursor-grabbing {
            cursor: grabbing;
        }
    </style>
</head>

<body>

    <div id="app" class="h-screen flex flex-col">

        <header class="h-14 border-b border-bg-border bg-bg-panel flex items-center justify-between px-5 z-50">
            <div class="flex items-center gap-4">
                <div
                    class="flex items-center gap-2 cursor-pointer text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">
                    Moly
                </div>
                <div class="h-4 w-[1px] bg-bg-border"></div>
                <div class="flex items-center gap-2 text-sm text-gray-400">
                    <span>工作流</span>
                    <i class="ph ph-caret-right text-xs"></i>
                    <span class="text-white">AI 电商编辑器</span>
                </div>
            </div>

            <div class="flex items-center gap-5 text-gray-400">
                <i class="ph ph-question text-xl hover:text-white cursor-pointer transition-colors"></i>
                <div class="relative cursor-pointer hover:text-white transition-colors">
                    <i class="ph ph-bell text-xl"></i>
                    <span
                        class="absolute top-0 right-0 w-2 h-2 bg-red-500 rounded-full border-2 border-bg-panel"></span>
                </div>
                <div
                    class="w-8 h-8 rounded-full bg-gradient-to-br from-pink-500 to-orange-400 cursor-pointer border border-white/20">
                </div>
            </div>
        </header>

        <div class="flex-1 flex overflow-hidden">

            <aside class="w-80 bg-bg-panel border-r border-bg-border flex flex-col p-4 gap-6 overflow-y-auto z-20">

                <div class="flex flex-col gap-3">
                    <div class="flex justify-between items-center text-sm">
                        <span class="text-gray-300 font-medium">1. 模特图输入</span>
                        <i class="ph ph-info text-gray-500 cursor-pointer"></i>
                    </div>

                    <div class="h-48 rounded-xl border border-dashed border-bg-border bg-bg-card hover:border-blue-500/50 hover:bg-bg-hover transition-all cursor-pointer relative group overflow-hidden"
                        @click="triggerUpload('model')">
                        <div v-if="!inputs.model"
                            class="absolute inset-0 flex flex-col items-center justify-center gap-2 text-gray-500">
                            <i class="ph ph-plus text-2xl group-hover:text-blue-400 transition-colors"></i>
                            <span class="text-xs">点击上传模特图</span>
                        </div>
                        <div v-else class="w-full h-full relative">
                            <img :src="inputs.model" class="w-full h-full object-cover">
                            <button @click.stop="inputs.model = null"
                                class="absolute top-2 right-2 w-6 h-6 bg-black/60 rounded-full flex items-center justify-center hover:bg-red-500/80 transition-colors">
                                <i class="ph ph-x text-xs text-white"></i>
                            </button>
                        </div>
                    </div>

                    <div class="grid grid-cols-4 gap-2">
                        <button
                            class="col-span-3 bg-bg-card border border-bg-border text-xs text-gray-300 py-2 rounded-lg hover:bg-bg-hover hover:border-white/20 transition-all">
                            从库中选择
                        </button>
                        <button
                            class="col-span-1 bg-bg-card border border-bg-border py-2 rounded-lg hover:bg-bg-hover flex items-center justify-center">
                            <i class="ph ph-upload-simple text-gray-400"></i>
                        </button>
                    </div>
                </div>

                <div class="flex flex-col gap-3">
                    <div class="flex justify-between items-center text-sm">
                        <span class="text-gray-300 font-medium">2. 服装图输入</span>
                        <i class="ph ph-info text-gray-500 cursor-pointer"></i>
                    </div>

                    <div class="h-48 rounded-xl border border-dashed border-bg-border bg-bg-card hover:border-blue-500/50 hover:bg-bg-hover transition-all cursor-pointer relative group overflow-hidden"
                        @click="triggerUpload('garment')">
                        <div v-if="!inputs.garment"
                            class="absolute inset-0 flex flex-col items-center justify-center gap-2 text-gray-500">
                            <i class="ph ph-t-shirt text-2xl group-hover:text-blue-400 transition-colors"></i>
                            <span class="text-xs">点击上传服装平铺图</span>
                        </div>
                        <div v-else class="w-full h-full relative">
                            <img :src="inputs.garment" class="w-full h-full object-contain p-2">
                            <button @click.stop="inputs.garment = null"
                                class="absolute top-2 right-2 w-6 h-6 bg-black/60 rounded-full flex items-center justify-center hover:bg-red-500/80 transition-colors">
                                <i class="ph ph-x text-xs text-white"></i>
                            </button>
                        </div>
                    </div>

                    <div class="grid grid-cols-4 gap-2">
                        <button
                            class="col-span-3 bg-bg-card border border-bg-border text-xs text-gray-300 py-2 rounded-lg hover:bg-bg-hover hover:border-white/20 transition-all">
                            从库中选择
                        </button>
                        <button
                            class="col-span-1 bg-bg-card border border-bg-border py-2 rounded-lg hover:bg-bg-hover flex items-center justify-center">
                            <i class="ph ph-upload-simple text-gray-400"></i>
                        </button>
                    </div>
                </div>
            </aside>

            <main
                class="flex-1 bg-black relative flex flex-col items-center justify-center overflow-hidden z-10 canvas-grid">

                <div
                    class="absolute top-6 flex items-center gap-1 bg-bg-panel/90 backdrop-blur border border-bg-border rounded-lg p-1 shadow-2xl z-20">
                    <button @click="zoomOut"
                        class="w-8 h-8 flex items-center justify-center rounded hover:bg-white/10 text-gray-400 hover:text-white transition-colors">
                        <i class="ph ph-minus"></i>
                    </button>
                    <span class="text-xs font-mono w-12 text-center text-gray-400">{{ Math.round(canvas.zoom * 100)
                        }}%</span>
                    <button @click="zoomIn"
                        class="w-8 h-8 flex items-center justify-center rounded hover:bg-white/10 text-gray-400 hover:text-white transition-colors">
                        <i class="ph ph-plus"></i>
                    </button>
                    <div class="w-[1px] h-4 bg-white/10 mx-1"></div>
                    <button @click="fitScreen"
                        class="px-3 h-8 flex items-center justify-center rounded hover:bg-white/10 text-xs text-gray-400 hover:text-white transition-colors gap-2">
                        <i class="ph ph-corners-out"></i> 适应
                    </button>
                    <div class="w-[1px] h-4 bg-white/10 mx-1"></div>
                    <button
                        class="px-3 h-8 flex items-center justify-center rounded hover:bg-white/10 text-xs text-brand-blue hover:text-blue-400 transition-colors gap-2">
                        <i class="ph ph-download-simple"></i> 下载
                    </button>
                </div>

                <div class="relative shadow-2xl origin-center will-change-transform"
                    :class="canvas.isDragging ? 'cursor-grabbing' : 'cursor-grab'" :style="{ 
                        transform: `translate(${canvas.x}px, ${canvas.y}px) scale(${canvas.zoom})`,
                        transition: canvas.isDragging ? 'none' : 'transform 0.1s ease-out' 
                    }" @mousedown="startDrag" @wheel.prevent="handleWheel">
                    <div v-if="canvas.loading"
                        class="absolute inset-0 z-50 bg-black/60 backdrop-blur-sm flex flex-col items-center justify-center rounded-lg">
                        <div
                            class="w-10 h-10 border-4 border-blue-500/30 border-t-blue-500 rounded-full animate-spin mb-4">
                        </div>
                        <span class="text-sm text-blue-200 animate-pulse">AI 正在编织画面...</span>
                    </div>

                    <div
                        class="w-[500px] h-[650px] bg-[#111] rounded-lg border border-bg-border overflow-hidden flex items-center justify-center relative shadow-lg">

                        <div v-if="!canvas.resultImage && !inputs.model" class="text-center">
                            <i class="ph ph-image text-4xl text-gray-700 mb-2"></i>
                            <p class="text-gray-600 text-xs">等待输入...</p>
                        </div>

                        <img v-if="inputs.model" :src="inputs.model"
                            class="w-full h-full object-cover opacity-50 absolute inset-0 pointer-events-none">

                        <img v-if="canvas.resultImage" :src="canvas.resultImage"
                            class="w-full h-full object-cover absolute inset-0 transition-opacity duration-150 pointer-events-none"
                            :class="{ 'opacity-0': canvas.isComparing }">
                    </div>
                </div>

                <div v-if="canvas.resultImage" class="absolute bottom-8 z-20">
                    <button @mousedown="startCompare" @mouseup="endCompare" @mouseleave="endCompare"
                        @touchstart="startCompare" @touchend="endCompare"
                        class="bg-bg-panel/80 backdrop-blur border border-bg-border text-white text-xs px-6 py-2.5 rounded-full shadow-xl flex items-center gap-2 hover:bg-white/10 transition-all select-none active:scale-95">
                        <i class="ph ph-columns"></i>
                        按住对比
                    </button>
                </div>

            </main>

            <aside class="w-80 bg-bg-panel border-l border-bg-border flex flex-col z-20">

                <div class="p-5 border-b border-bg-border">
                    <h2 class="text-sm font-semibold text-white mb-1">生成设置</h2>
                    <p class="text-xs text-gray-500">配置 AI 如何融合服装。</p>
                </div>

                <div class="flex-1 overflow-y-auto p-5 space-y-6">

                    <div v-for="(field, index) in currentTemplateConfig" :key="index" class="space-y-3">

                        <div v-if="field.type === 'select'">
                            <label class="text-xs text-gray-400 block mb-2">{{ field.label }}</label>
                            <div class="relative">
                                <select v-model="field.value"
                                    class="w-full bg-bg-card text-sm text-white border border-bg-border rounded-lg px-3 py-2.5 outline-none focus:border-blue-500/50 appearance-none cursor-pointer">
                                    <option v-for="opt in field.options" :value="opt.value">{{ opt.label }}</option>
                                </select>
                                <i
                                    class="ph ph-caret-down absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 pointer-events-none"></i>
                            </div>
                        </div>

                        <div v-if="field.type === 'toggle'" class="flex items-center justify-between group">
                            <div class="flex flex-col">
                                <span class="text-sm text-gray-300 group-hover:text-white transition-colors">{{
                                    field.label }}</span>
                                <span class="text-[10px] text-gray-500">{{ field.desc }}</span>
                            </div>
                            <div class="w-10 h-5 rounded-full relative cursor-pointer transition-colors duration-200"
                                :class="field.value ? 'bg-brand-blue' : 'bg-gray-700'"
                                @click="field.value = !field.value">
                                <div class="w-3 h-3 bg-white rounded-full absolute top-1 transition-all duration-200 shadow-sm"
                                    :class="field.value ? 'left-6' : 'left-1'"></div>
                            </div>
                        </div>

                    </div>

                    <div class="pt-6 border-t border-bg-border">
                        <h3 class="text-xs text-gray-500 mb-3">最近生成</h3>
                        <div class="grid grid-cols-3 gap-2">
                            <div
                                class="aspect-square bg-bg-card rounded-lg border border-bg-border cursor-pointer hover:border-white/20">
                            </div>
                            <div
                                class="aspect-square bg-bg-card rounded-lg border border-bg-border cursor-pointer hover:border-white/20">
                            </div>
                            <div
                                class="aspect-square bg-bg-card rounded-lg border border-bg-border flex items-center justify-center text-gray-600 hover:text-gray-400 cursor-pointer">
                                <i class="ph ph-dots-three text-xl"></i>
                            </div>
                        </div>
                    </div>

                </div>

                <div class="p-5 border-t border-bg-border bg-bg-panel z-30">
                    <div class="flex justify-between items-center text-xs text-gray-500 mb-3">
                        <span>预估消耗</span>
                        <span class="text-yellow-500 flex items-center gap-1">
                            <i class="ph ph-lightning-fill"></i> 3 积分
                        </span>
                    </div>
                    <button @click="generate" :disabled="canvas.loading || !inputs.model || !inputs.garment"
                        class="w-full bg-brand-blue hover:bg-brand-hover disabled:bg-gray-800 disabled:text-gray-500 disabled:cursor-not-allowed text-white font-medium py-3 rounded-lg transition-all shadow-lg shadow-blue-900/20 flex items-center justify-center gap-2">
                        <i v-if="!canvas.loading" class="ph ph-magic-wand"></i>
                        <span v-if="!canvas.loading">生成试穿测试</span>
                        <span v-else>正在处理...</span>
                    </button>
                </div>
            </aside>

        </div>

    </div>

    <script>
        const { createApp, reactive, ref, onUnmounted } = Vue;

        createApp({
            setup() {
                // 1. Core State: Inputs & Canvas
                const inputs = reactive({
                    model: 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=600&auto=format&fit=crop',
                    garment: null
                });

                // 修改点：canvas 增加了 x, y 坐标和拖拽状态
                const canvas = reactive({
                    zoom: 0.85,
                    x: 0,
                    y: 0,
                    isDragging: false,
                    loading: false,
                    resultImage: null,
                    isComparing: false
                });

                // 2. Drag & Zoom Logic (新增核心交互代码)
                let startX = 0, startY = 0;
                let initialX = 0, initialY = 0;

                const startDrag = (e) => {
                    // 如果点击的是内部按钮等，不触发拖拽
                    if (e.target.closest('button')) return;

                    canvas.isDragging = true;
                    startX = e.clientX;
                    startY = e.clientY;
                    initialX = canvas.x;
                    initialY = canvas.y;

                    // 绑定到 window 防止拖出 div 后失效
                    window.addEventListener('mousemove', onDrag);
                    window.addEventListener('mouseup', stopDrag);
                };

                const onDrag = (e) => {
                    if (!canvas.isDragging) return;
                    const dx = e.clientX - startX;
                    const dy = e.clientY - startY;
                    canvas.x = initialX + dx;
                    canvas.y = initialY + dy;
                };

                const stopDrag = () => {
                    canvas.isDragging = false;
                    window.removeEventListener('mousemove', onDrag);
                    window.removeEventListener('mouseup', stopDrag);
                };

                const handleWheel = (e) => {
                    // 简单的滚轮缩放逻辑
                    const delta = e.deltaY > 0 ? -0.1 : 0.1;
                    const newZoom = Math.max(0.2, Math.min(3.0, canvas.zoom + delta));
                    canvas.zoom = Number(newZoom.toFixed(2));
                };

                // 画布操作辅助
                const zoomIn = () => { if (canvas.zoom < 3.0) canvas.zoom += 0.1; };
                const zoomOut = () => { if (canvas.zoom > 0.2) canvas.zoom -= 0.1; };
                const fitScreen = () => {
                    canvas.zoom = 0.85;
                    canvas.x = 0;
                    canvas.y = 0;
                };

                // 3. Configuration & Other Logic (保持不变)
                const currentTemplateConfig = reactive([
                    {
                        type: 'select',
                        label: '模特动作',
                        value: 'default',
                        options: [
                            { label: '保持原始姿势 (Default)', value: 'default' },
                            { label: '双手下垂 (Standing)', value: 'standing' },
                            { label: '插兜 (Pockets)', value: 'pockets' }
                        ]
                    },
                    { type: 'toggle', label: '保留背景', desc: '不移除原始场景', value: true },
                    { type: 'toggle', label: '保留配饰', desc: '保留项链/手表', value: false },
                    { type: 'toggle', label: '光影增强', desc: '匹配摄影棚光效', value: false }
                ]);

                const triggerUpload = (type) => {
                    if (type === 'model') {
                        inputs.model = inputs.model ? null : 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=600&auto=format&fit=crop';
                    } else if (type === 'garment') {
                        inputs.garment = 'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?q=80&w=600&auto=format&fit=crop';
                    }
                };

                const generate = () => {
                    canvas.loading = true;
                    setTimeout(() => {
                        canvas.resultImage = 'https://plus.unsplash.com/premium_photo-1673356301535-2cc32e9244d3?q=80&w=600&auto=format&fit=crop';
                        canvas.loading = false;
                    }, 2500);
                };

                const startCompare = () => canvas.isComparing = true;
                const endCompare = () => canvas.isComparing = false;

                // 清理事件监听
                onUnmounted(() => {
                    window.removeEventListener('mousemove', onDrag);
                    window.removeEventListener('mouseup', stopDrag);
                });

                return {
                    inputs,
                    canvas,
                    currentTemplateConfig,
                    triggerUpload,
                    zoomIn, zoomOut, fitScreen, handleWheel,
                    generate,
                    startCompare, endCompare,
                    startDrag // 导出给 template 使用
                };
            }
        }).mount('#app');
    </script>
</body>

</html>
