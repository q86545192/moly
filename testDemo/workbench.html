<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moly Workbench - 工作台</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: {
                            main: '#050505',
                            card: '#0F0F10',
                            input: '#1A1A1C',
                            hover: '#18181B'
                        },
                        brand: {
                            blue: '#3b82f6',
                            accent: '#6366f1'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #050505;
            color: white;
            font-family: 'Inter', sans-serif;
        }

        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #050505;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }

        /* 隐藏 input search 的 x */
        input[type="search"]::-webkit-search-decoration,
        input[type="search"]::-webkit-search-cancel-button,
        input[type="search"]::-webkit-search-results-button,
        input[type="search"]::-webkit-search-results-decoration {
            display: none;
        }

        /* 卡片数字背景字体 */
        .bg-number {
            font-size: 8rem;
            line-height: 1;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.03);
            position: absolute;
            top: -20px;
            left: 0;
            z-index: 0;
            user-select: none;
            pointer-events: none;
        }

        /* 图片对比滑块样式 */
        .slider-handle {
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>

<body>

    <div id="app" class="min-h-screen flex flex-col">

        <header
            class="h-16 border-b border-white/10 bg-bg-main px-6 flex items-center justify-between sticky top-0 z-50">
            <div class="flex items-center gap-10">
                <div class="flex items-center gap-2 cursor-pointer">
                    <span
                        class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">Moly</span>
                </div>

                <nav class="flex items-center gap-6 text-sm font-medium">
                    <a href="#" class="text-blue-400 border-b-2 border-blue-400 py-5">工作流</a>
                    <a href="#" class="text-gray-400 hover:text-white transition-colors py-5">资产库</a>
                </nav>
            </div>

            <div class="flex items-center gap-6">
                <div class="relative group">
                    <i
                        class="ph ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 group-focus-within:text-blue-400 transition-colors"></i>
                    <input type="text" v-model="searchQuery" placeholder="搜索工作流..."
                        class="bg-bg-input text-sm text-white pl-9 pr-4 py-1.5 rounded-lg border border-transparent focus:border-blue-500/50 focus:bg-bg-hover outline-none transition-all w-64 placeholder-gray-600">
                </div>

                <div class="relative cursor-pointer text-gray-400 hover:text-white transition-colors">
                    <i class="ph ph-bell text-xl"></i>
                    <span
                        class="absolute top-0 right-0 w-2 h-2 bg-blue-500 rounded-full border-2 border-bg-main"></span>
                </div>

                <div
                    class="flex items-center gap-2 bg-bg-input px-3 py-1.5 rounded-full border border-white/5 cursor-pointer hover:border-white/20 transition-all">
                    <span class="text-xs text-gray-400">剩余额度</span>
                    <span class="text-sm font-bold text-white">{{ user.credits.toLocaleString() }}</span>
                    <i class="ph ph-plus-circle text-blue-500"></i>
                </div>

                <div
                    class="w-8 h-8 rounded-full bg-gradient-to-br from-gray-700 to-gray-600 flex items-center justify-center text-xs font-bold border border-white/10 cursor-pointer">
                    USER
                </div>
            </div>
        </header>

        <main class="flex-1 max-w-7xl w-full mx-auto px-6 py-8">

            <div class="flex items-center gap-8 border-b border-white/10 mb-8">
                <button v-for="tab in tabs" :key="tab.id" @click="activeTab = tab.id"
                    class="pb-3 text-sm font-medium transition-all relative"
                    :class="activeTab === tab.id ? 'text-white' : 'text-gray-500 hover:text-gray-300'">
                    {{ tab.name }}
                    <span v-if="activeTab === tab.id"
                        class="absolute bottom-[-1px] left-0 w-full h-[2px] bg-blue-500 rounded-t-full"></span>
                </button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                <div v-for="(card, index) in filteredCards" :key="card.id"
                    class="bg-bg-card rounded-2xl border border-white/5 p-6 relative overflow-hidden group hover:border-white/10 transition-all duration-300">
                    <div class="bg-number">{{ index + 1 }}.</div>

                    <div class="relative z-10 flex justify-between h-full gap-6">

                        <div class="flex flex-col justify-between w-1/3 py-2">
                            <div>
                                <h3 class="text-xl font-bold text-white mb-1">{{ card.title }}</h3>
                                <p class="text-xs text-gray-400 mb-6">{{ card.subtitle }}</p>
                            </div>

                            <div>
                                <button v-if="card.status === 'active'"
                                    class="bg-blue-600 hover:bg-blue-500 text-white text-xs font-semibold px-5 py-2 rounded-full transition-all shadow-lg shadow-blue-900/20">
                                    {{ card.ctaText }}
                                </button>
                                <button v-else
                                    class="border border-white/10 text-gray-500 text-xs font-semibold px-5 py-2 rounded-full cursor-not-allowed">
                                    {{ card.ctaText }}
                                </button>
                            </div>
                        </div>

                        <div class="w-2/3 h-64 bg-black/20 rounded-xl border border-white/5 overflow-hidden relative">

                            <div v-if="card.type === 'static'" class="w-full h-full">
                                <img :src="card.image"
                                    class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity duration-500">
                                <div class="absolute inset-0 flex items-center justify-center">
                                    <div
                                        class="w-8 h-8 rounded-full bg-black/50 backdrop-blur border border-white/20 flex items-center justify-center">
                                        <i class="ph ph-arrows-left-right text-white text-xs"></i>
                                    </div>
                                </div>
                            </div>

                            <div v-if="card.type === 'mockup'"
                                class="w-full h-full p-4 bg-[#bcaaa4]/10 flex items-center justify-center">
                                <img :src="card.image" class="max-h-full object-contain shadow-2xl">
                            </div>

                            <div v-if="card.type === 'slider'"
                                class="w-full h-full relative cursor-col-resize group/slider"
                                @mousemove="handleSliderMove($event, card.id)"
                                @touchstart="handleSliderMove($event, card.id)" ref="sliderContainers">
                                <img :src="card.afterImage" class="absolute inset-0 w-full h-full object-cover">

                                <div class="absolute inset-0 w-full h-full overflow-hidden border-r border-white/50"
                                    :style="{ width: (sliderPositions[card.id] || 50) + '%' }">
                                    <img :src="card.beforeImage" class="absolute top-0 left-0 max-w-none h-full"
                                        :style="{ width: sliderWidths[card.id] + 'px' }">

                                    <div
                                        class="absolute bottom-2 left-2 text-[10px] font-bold text-white/50 bg-black/30 px-1 rounded">
                                        ORIGINAL</div>
                                </div>

                                <div
                                    class="absolute bottom-2 right-2 text-[10px] font-bold text-white bg-blue-600/80 px-1 rounded">
                                    4K UPSCALED</div>

                                <div class="absolute top-0 bottom-0 w-0.5 bg-white cursor-col-resize flex items-center justify-center"
                                    :style="{ left: (sliderPositions[card.id] || 50) + '%' }">
                                    <div
                                        class="w-6 h-6 rounded-full bg-white shadow-lg flex items-center justify-center">
                                        <i class="ph ph-caret-left-right text-black text-xs"></i>
                                    </div>
                                </div>
                            </div>

                            <div v-if="card.type === 'wireframe'" class="w-full h-full p-3 bg-[#1A1A1C] flex gap-2">
                                <div class="w-1/4 h-full flex flex-col gap-2">
                                    <div class="h-1/3 bg-white/5 rounded-md border border-white/5"></div>
                                    <div class="h-1/3 bg-white/5 rounded-md border border-white/5"></div>
                                    <div class="h-1/3 bg-white/5 rounded-md border border-white/5"></div>
                                </div>
                                <div class="w-3/4 h-full flex flex-col gap-2">
                                    <div class="h-1/4 w-full flex gap-2">
                                        <div class="w-2/3 bg-white/10 rounded-md border border-white/5"></div>
                                        <div
                                            class="w-1/3 bg-blue-500/10 rounded-md border border-blue-500/20 flex items-center justify-center">
                                            <i class="ph ph-image text-blue-500/50"></i>
                                        </div>
                                    </div>
                                    <div
                                        class="h-3/4 bg-white/5 rounded-md border border-white/5 p-2 grid grid-cols-2 gap-2">
                                        <div class="bg-white/5 rounded"></div>
                                        <div class="bg-white/5 rounded"></div>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>

            </div>

        </main>

        <footer class="text-center py-6 text-xs text-gray-600">
            Moly AI v1 @2026
        </footer>
    </div>

    <script>
        const { createApp, ref, computed, onMounted, nextTick } = Vue;

        createApp({
            setup() {
                // User State
                const user = ref({
                    credits: 2500,
                    avatar: ''
                });

                // Search & Filter State
                const searchQuery = ref('');
                const activeTab = ref('all');

                // Tabs Config
                const tabs = [
                    { id: 'all', name: '全部' },
                    { id: 'model', name: '电商模特' },
                    { id: 'aplus', name: 'A+ 页面' },
                    { id: 'video', name: '视频工具' }
                ];

                // Data Cards
                // 真实场景下，图片应为实际 CDN 链接。这里使用 Unsplash 占位。
                const cards = ref([
                    {
                        id: 1,
                        title: 'AI 模特换装',
                        subtitle: '(全球版)',
                        type: 'static',
                        category: 'model',
                        status: 'active',
                        ctaText: '立即生成',
                        image: 'https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?q=80&w=600&auto=format&fit=crop'
                    },
                    {
                        id: 2,
                        title: 'IP 周边商品生成',
                        subtitle: 'T-shirt / 马克杯',
                        type: 'mockup',
                        category: 'model', // 归类示例
                        status: 'active',
                        ctaText: '立即生成',
                        image: 'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?q=80&w=600&auto=format&fit=crop'
                    },
                    {
                        id: 3,
                        title: '图片放大',
                        subtitle: '(4K 超清)',
                        type: 'slider',
                        category: 'video', // 归类示例
                        status: 'active',
                        ctaText: '立即放大',
                        // 使用两张稍微不同的图模拟模糊和清晰
                        beforeImage: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=10&w=600&blur=5',
                        afterImage: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=600'
                    },
                    {
                        id: 4,
                        title: '亚马逊 A+ 布局',
                        subtitle: '(测试中)',
                        type: 'wireframe',
                        category: 'aplus',
                        status: 'disabled',
                        ctaText: '未开放',
                        image: '' // CSS drawn
                    }
                ]);

                // Logic: Filtering
                const filteredCards = computed(() => {
                    return cards.value.filter(card => {
                        // 1. Tab Filter
                        const matchesTab = activeTab.value === 'all' || card.category === activeTab.value;
                        // 2. Search Filter
                        const matchesSearch = card.title.toLowerCase().includes(searchQuery.value.toLowerCase()) ||
                            card.subtitle.toLowerCase().includes(searchQuery.value.toLowerCase());

                        return matchesTab && matchesSearch;
                    });
                });

                // Logic: Slider Component
                const sliderPositions = ref({}); // Store slider % for each card id
                const sliderWidths = ref({}); // Store actual px width for image containment

                const handleSliderMove = (event, id) => {
                    const container = event.currentTarget;
                    const rect = container.getBoundingClientRect();

                    // 获取 X 坐标 (支持 Touch 和 Mouse)
                    const clientX = event.touches ? event.touches[0].clientX : event.clientX;

                    let x = clientX - rect.left;
                    // 边界限制
                    if (x < 0) x = 0;
                    if (x > rect.width) x = rect.width;

                    const percentage = (x / rect.width) * 100;
                    sliderPositions.value[id] = percentage;

                    // 同时更新容器宽度，用于保持 Before 图片不被挤压
                    sliderWidths.value[id] = rect.width;
                };

                // 初始化时获取一次宽度
                const updateSliderWidths = () => {
                    // 简单处理：在真实项目中可能需要 ResizeObserver
                    // 这里依靠 mousemove 动态修正
                };

                return {
                    user,
                    searchQuery,
                    activeTab,
                    tabs,
                    filteredCards,
                    sliderPositions,
                    sliderWidths,
                    handleSliderMove
                };
            }
        }).mount('#app');
    </script>
</body>

</html>
